# Minimal single-binary Loki config for the log-ingest stack.
# Requires Loki 3.0+ (structured metadata) with the tsdb v13 schema.
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-04-01
      store: tsdb
      object_store: filesystem
      schema: v13 # v13 + tsdb is required for structured metadata
      index:
        prefix: index_
        period: 24h

limits_config:
  allow_structured_metadata: true # the ingest attaches report_id/xuid/... as structured metadata
  retention_period: 168h # 7 days (max) — the compactor deletes chunks older than this
  reject_old_samples: false # tester logs are timestamped with the client's time, which may be in the past
  max_line_size: 4MB # matches the ingest's per-line cap
  ingestion_rate_mb: 32
  ingestion_burst_size_mb: 64

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  delete_request_store: filesystem

analytics:
  reporting_enabled: false
